name: Build Compose APK

# 云端构建原生 Compose App 的调试版 APK(本机无需 Android SDK)。
# 触发:Actions 页手动 Run workflow,或推送 v* 标签。
on:
  workflow_dispatch:
  push:
    branches: ['fix/realtime-agent-v1.0.15-ci']
    tags: ['v*']

jobs:
  apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-compose
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: xiaoling-native-debug-apk
          path: android-compose/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
