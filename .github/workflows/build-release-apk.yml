name: Build Release APK

# 出可上架的签名 release APK(R8混淆 + HTTPS-only + 去日志)。
# 需要先在仓库配好 4 个 Secrets(见 android-compose/RELEASE.md):
#   KEYSTORE_BASE64, KS_PASS, KEY_ALIAS, KEY_PASS
on:
  workflow_dispatch:
  push:
    branches: ['fix/redmi-voice-v1.0.12-ci']
    tags: ['v*']

jobs:
  release-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-compose
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: server/requirements.txt

      - name: Test AI server
        working-directory: server
        run: |
          pip install -r requirements.txt pytest
          pytest tests -q

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/xl.keystore"
          wc -c "$RUNNER_TEMP/xl.keystore"

      - name: Build signed release APK
        env:
          XL_KEYSTORE: ${{ runner.temp }}/xl.keystore
          XL_KS_PASS: ${{ secrets.KS_PASS }}
          XL_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          XL_KEY_PASS: ${{ secrets.KEY_PASS }}
        run: gradle assembleRelease --no-daemon --stacktrace

      - name: Prepare transfer-safe release files
        run: |
          cp app/build/outputs/apk/release/app-release.apk xiaoling-v1.0.12-release.apk
          sha256sum xiaoling-v1.0.12-release.apk | tee xiaoling-v1.0.12-release.apk.sha256
          zip -j xiaoling-v1.0.12-release.zip xiaoling-v1.0.12-release.apk xiaoling-v1.0.12-release.apk.sha256

      - name: Upload release APK and ZIP
        uses: actions/upload-artifact@v4
        with:
          name: xiaoling-v1.0.12-release
          path: |
            android-compose/xiaoling-v1.0.12-release.apk
            android-compose/xiaoling-v1.0.12-release.zip
            android-compose/xiaoling-v1.0.12-release.apk.sha256
          if-no-files-found: error
