name: Build Release APK

# 出可上架的签名 release APK(R8混淆 + HTTPS-only + 去日志)。
# 需要先在仓库配好 4 个 Secrets(见 android-compose/RELEASE.md):
#   KEYSTORE_BASE64, KS_PASS, KEY_ALIAS, KEY_PASS
on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  release-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-compose
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" > ks.b64
          base64 -di ks.b64 > "$RUNNER_TEMP/xl.keystore"
          wc -c "$RUNNER_TEMP/xl.keystore"
      - name: Build signed release APK
        env:
          XL_KEYSTORE: ${{ runner.temp }}/xl.keystore
          XL_KS_PASS: ${{ secrets.KS_PASS }}
          XL_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          XL_KEY_PASS: ${{ secrets.KEY_PASS }}
        run: gradle assembleRelease --no-daemon --stacktrace

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: xiaoling-release-apk
          path: android-compose/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
