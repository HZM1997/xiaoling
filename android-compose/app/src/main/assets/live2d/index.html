<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<style>
  html,body{margin:0;height:100%;background:transparent;overflow:hidden}
  #cv{width:100%;height:100%;display:block}
  #tip{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    text-align:center;color:#6b7787;font-family:sans-serif;font-size:15px;padding:24px;line-height:1.7}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div id="tip">正在加载 Live2D 形象…<br><small>把模型放到 assets/live2d/model/,把运行时放到 assets/live2d/lib/</small></div>
<script>
/* 小灵 · Live2D 原生内嵌页(WebView)
 * 由原生层通过 window.XLAvatar.setState('idle'|'listen'|'think'|'talk'|'alarm'|'caring') 与 setTalking(bool) 驱动。
 * 运行时与模型都用本地文件(离线):
 *   - assets/live2d/lib/live2dcubismcore.min.js
 *   - assets/live2d/lib/pixi.min.js
 *   - assets/live2d/lib/index.min.js   (pixi-live2d-display)
 *   - assets/live2d/model/xxx.model3.json  (你的角色模型)
 * 缺任一则显示提示,不影响 App(原生层可回退到静态/动图形象)。
 */
var CONFIG = {
  MODEL: './model/model.model3.json',          // 换成你的模型文件名
  LIB: ['./lib/live2dcubismcore.min.js','./lib/pixi.min.js','./lib/index.min.js'],
  // 状态 → 表情名(按你模型里的表情改)
  EXPR: { idle:'exp_idle', listen:'exp_idle', think:'exp_think', talk:'exp_idle', alarm:'exp_surprised', caring:'exp_smile' },
  MOUTH: 'ParamMouthOpenY'
};
var model=null, talking=false, pending='idle';
window.XLAvatar = {
  setState:function(s){ pending=s; if(model){ var e=CONFIG.EXPR[s]; if(e&&model.expression){try{model.expression(e)}catch(_){}} } },
  setTalking:function(on){ talking=!!on; }
};
function load(src){return new Promise(function(res,rej){var s=document.createElement('script');s.src=src;s.onload=res;s.onerror=function(){rej(src)};document.head.appendChild(s);});}
(async function(){
  try{ for(var i=0;i<CONFIG.LIB.length;i++){ await load(CONFIG.LIB[i]); } }
  catch(e){ document.getElementById('tip').innerHTML='未找到 Live2D 运行时:<br>'+e+'<br>请把 3 个 JS 放到 assets/live2d/lib/'; return; }
  var PIXI=window.PIXI;
  if(!PIXI||!PIXI.live2d){ document.getElementById('tip').textContent='Live2D 运行时不完整'; return; }
  var app=new PIXI.Application({view:document.getElementById('cv'),backgroundAlpha:0,resizeTo:window,antialias:true});
  try{ model=await PIXI.live2d.Live2DModel.from(CONFIG.MODEL); }
  catch(e){ document.getElementById('tip').innerHTML='未找到模型:<br>'+CONFIG.MODEL+'<br>请把模型放到 assets/live2d/model/'; return; }
  document.getElementById('tip').style.display='none';
  app.stage.addChild(model);
  function fit(){ var s=Math.min(window.innerWidth/model.width, window.innerHeight/model.height)*0.95; model.scale.set(s); model.x=(window.innerWidth-model.width)/2; model.y=(window.innerHeight-model.height)/2; }
  fit(); window.addEventListener('resize',fit);
  var t=0;
  app.ticker.add(function(){ if(!model.internalModel)return; var v=talking?(Math.sin(t+=0.35)*0.5+0.5):0; try{model.internalModel.coreModel.setParameterValueById(CONFIG.MOUTH,v)}catch(_){} });
  window.XLAvatar.setState(pending);
})();
</script>
</body>
</html>
